<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Приглашение</title>

<style>
body {
    margin: 0;
    font-family: 'Georgia', serif;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    background: linear-gradient(to top, #0f2027, #203a43, #2c5364);
    transition: background 6s ease;
}

/* Рассвет */
.sunrise {
    background: linear-gradient(to top, #ff9966, #ff5e62);
}

/* Солнце */
.sun {
    position: absolute;
    bottom: -150px;
    width: 200px;
    height: 200px;
    background: radial-gradient(circle, #ffd27f 0%, #ff8c42 60%, transparent 70%);
    border-radius: 50%;
    left: 50%;
    transform: translateX(-50%);
    transition: bottom 6s ease;
}

.sunrise .sun {
    bottom: 20%;
}

/* Карточка */
.card {
    position: relative;
    width: 90%;
    max-width: 380px;
    background: rgba(255, 255, 255, 0.95);
    border-radius: 25px;
    padding: 30px 25px;
    text-align: center;
    box-shadow: 0 15px 40px rgba(0,0,0,0.4);
}

h1 {
    margin: 0 0 15px 0;
    font-size: 22px;
}

p {
    font-size: 15px;
    line-height: 1.6;
}

.date {
    margin-top: 20px;
    font-weight: bold;
}

button {
    margin-top: 25px;
    padding: 12px 22px;
    font-size: 15px;
    border: none;
    border-radius: 30px;
    background: linear-gradient(45deg, #ff7e5f, #feb47b);
    color: white;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="sun"></div>

<div class="card">
    <h1>Дорогая Ксюнька 🌙</h1>
    <p>
        Ночь начинается с лёгкого бокала…  
        А закончится рассветом на пляже  
        и разговором по душам.
    </p>

    <div class="date">
        13.03.26 • 20:00<br>
        Наше любимое место
    </div>

    <button onclick="startSunrise()">Начать рассвет 🌅</button>
</div>

<audio id="waves" loop>
    <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_115b9b61c4.mp3?filename=ocean-waves-112906.mp3" type="audio/mpeg">
</audio>

<script>
function startSunrise() {
    document.body.classList.add("sunrise");
    document.getElementById("waves").play();

    setTimeout(function() {
        window.location.href = "mailto:?subject=Приглашение&body=Дорогая%20Ксюнька!%0A%0AПриглашаю%20тебя%20на%20вечерне-ночную%20прогулку%20по%20барам.%20Будем%20пить,%20курить%20и%20вайбово%20проводить%20время,%20а%20под%20утро%20встретим%20рассвет%20на%20пляже%20с%20бутылкой%20вина%20и%20разговорами%20по%20душам.%0A%0AБуду%20ждать!%0AДата:%2013.03.26%20в%2020:00%0AНаше%20любимое%20место.";
    }, 6000);
}
</script>

</body>
</html>
