
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Для Ксюньки 💛</title>
<style>
    body, html {
        margin: 0; padding: 0; width: 100%; height: 100%;
        overflow: hidden; background-color: #050508;
        font-family: 'Georgia', serif; color: white;
    }

    /* --- КОНВЕРТ И АНИМАЦИИ --- */
    .envelope-container {
        position: fixed; top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        width: 280px; height: 180px;
        background: #f4e4bc; border-radius: 5px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        cursor: pointer; z-index: 1000;
        transition: all 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        animation: sway 3s infinite ease-in-out;
    }

    @keyframes sway {
        0%, 100% { transform: translate(-50%, -52%) rotate(0deg); }
        50% { transform: translate(-50%, -48%) rotate(2deg); }
    }

    .flap {
        position: absolute; top: 0; left: 0;
        width: 0; height: 0;
        border-left: 140px solid transparent;
        border-right: 140px solid transparent;
        border-top: 100px solid #dcc693;
        transform-origin: top;
        transition: transform 0.4s ease;
        z-index: 3;
    }

    .envelope-container.open .flap { transform: rotateX(180deg); }

    .seal {
        position: absolute; top: 70px; left: 115px;
        width: 50px; height: 50px; background: #a31d1d;
        border-radius: 50%; z-index: 4;
        display: flex; align-items: center; justify-content: center;
        font-size: 24px;
        animation: pulse 1.5s infinite;
        transition: 0.3s;
    }

    @keyframes pulse {
        0% { box-shadow: 0 0 0 0 rgba(163, 29, 29, 0.7); }
        70% { box-shadow: 0 0 0 10px rgba(163, 29, 29, 0); }
        100% { box-shadow: 0 0 0 0 rgba(163, 29, 29, 0); }
    }

    .envelope-container.fade-out {
        transform: translate(-50%, 150vh) scale(0.5);
        opacity: 0;
    }

    /* --- СЦЕНА --- */
    .scene {
        position: fixed; inset: 0; opacity: 0;
        transition: opacity 3s ease; z-index: 10;
        pointer-events: none;
    }

    .background {
        position: absolute; inset: 0;
        background: url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e?q=80&w=2073&auto=format&fit=crop') center/cover;
        filter: brightness(0.2);
    }

    /* МЕРЦАЮЩИЕ ЗВЕЗДЫ */
    .stars {
        position: absolute; inset: 0;
        background-image: radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 3px);
        background-size: 100px 100px;
        animation: twinkle 5s infinite;
        opacity: 0.5;
    }

    @keyframes twinkle {
        0%, 100% { opacity: 0.3; }
        50% { opacity: 0.7; }
    }

    .dawn-layer {
        position: absolute; inset: 0;
        background: linear-gradient(to top, #ff7e5f, #feb47b, #200122);
        opacity: 0; z-index: 11;
        transition: opacity 15s ease-in-out;
    }

    .text-box {
        position: absolute; top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        width: 80%; max-width: 500px;
        text-align: center; z-index: 20;
        line-height: 1.6; font-size: 19px;
        text-shadow: 0 2px 10px #000;
        font-style: italic;
    }

    .cursor {
        display: inline-block; width: 2px; height: 18px;
        background: #fff; animation: blink 0.8s infinite;
        margin-left: 2px; vertical-align: middle;
    }
    @keyframes blink { 50% { opacity: 0; } }

</style>
</head>
<body>

    <div class="envelope-container" id="envelope">
        <div class="flap"></div>
        <div class="seal">❤️</div>
    </div>

    <div class="scene" id="scene">
        <div class="background"></div>
        <div class="stars"></div>
        <div class="dawn-layer" id="dawn"></div>
        <div class="text-box">
            <span id="output"></span><span class="cursor"></span>
        </div>
    </div>

    <audio id="bgMusic" loop>
        <source src="https://www.chosic.com/wp-content/uploads/2021/07/Rainy-Day-Background-Chill-Piano-Music.mp3" type="audio/mpeg">
    </audio>
    <audio id="seaSound" loop>
        <source src="https://actions.google.com/sounds/v1/water/ocean_waves.ogg" type="audio/ogg">
    </audio>

<script>
    const text = `Дорогая Ксюнька!

Приглашаю тебя на вечерне-ночную прогулку по барам. Будем пить, курить и вайбово проводить время.

А под утро сядем где-нибудь на пляже или в парке с бутылкой вина, и будем разговаривать по душам...

А в конце нежно поцелуемся и долго будем сидеть в тёплых объятиях.

Буду ждать!
💛

13.03.26 | 20:00
На нашем любимом месте.`;

    const env = document.getElementById('envelope');
    const scene = document.getElementById('scene');
    const dawn = document.getElementById('dawn');
    const output = document.getElementById('output');
    const music = document.getElementById('bgMusic');
    const sea = document.getElementById('seaSound');

    env.addEventListener('click', () => {
        env.classList.add('open');
        
        music.volume = 0.3;
        sea.volume = 0.2;
        music.play();
        sea.play();

        setTimeout(() => {
            env.classList.add('fade-out');
            scene.style.opacity = "1";
            
            setTimeout(startTyping, 2000);
        }, 1000);
    });

    function startTyping() {
        let i = 0;
        function type() {
            if (i < text.length) {
                output.innerHTML += text[i];
                i++;
                
                // Рассвет за 50 символов до конца
                if (text.length - i === 50) {
                    dawn.style.opacity = "0.7";
                }
                
                setTimeout(type, 60);
            }
        }
        type();
    }
</script>
</body>
</html>
