

<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Для Ксюньки 💛</title>

<style>
html,body{
margin:0;
padding:0;
height:100%;
overflow:hidden;
font-family:Georgia,serif;
background:black;
color:white;
}

/* КНОПКА */
#openBtn{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
padding:20px 50px;
font-size:20px;
border-radius:40px;
border:2px solid white;
background:black;
color:white;
z-index:10;
}

/* СЦЕНА */
.scene{
position:fixed;
inset:0;
opacity:0;
transition:opacity 2s ease;
background:linear-gradient(to top,#02030a 0%, #050510 60%, #000 100%);
overflow:hidden;
}

/* ЗВЁЗДЫ */
.stars::after{
content:"";
position:absolute;
width:2px;
height:2px;
background:white;
box-shadow:
10vw 20vh white,
30vw 10vh white,
60vw 40vh white,
80vw 15vh white,
50vw 60vh white,
20vw 50vh white,
70vw 30vh white;
animation:twinkle 3s infinite alternate;
}

@keyframes twinkle{
from{opacity:0.3;}
to{opacity:1;}
}

/* МОРЕ */
.sea{
position:absolute;
bottom:0;
width:100%;
height:40%;
background:linear-gradient(to top,#02121f,#032436);
overflow:hidden;
}

/* ВОЛНЫ */
.wave{
position:absolute;
width:200%;
height:100%;
background:radial-gradient(circle at 50% 0%, rgba(255,255,255,0.08), transparent 70%);
animation:waveMove 8s linear infinite;
}

.wave:nth-child(2){
animation-duration:12s;
opacity:0.6;
}

@keyframes waveMove{
from{transform:translateX(0);}
to{transform:translateX(-50%);}
}

/* СОЛНЦЕ */
.sun{
position:absolute;
bottom:-200px;
left:50%;
transform:translateX(-50%);
width:60vw;
height:60vw;
max-width:260px;
max-height:260px;
background:radial-gradient(circle,#ffd27f 0%,#ffb36b 50%,transparent 70%);
border-radius:50%;
transition:bottom 18s ease;
opacity:0.9;
}

/* ПЛАВНЫЙ РАССВЕТ */
.dawn{
background:linear-gradient(to top,#ffb07c 0%, #ff8c6b 40%, #5b3a86 100%);
transition:background 20s ease;
}

/* ТЕКСТ */
.letter{
position:absolute;
top:52%;
left:50%;
transform:translate(-50%,-50%);
width:90%;
max-width:500px;
text-align:center;
font-size:4.5vw;
line-height:1.6;
white-space:pre-line;
z-index:5;
}

@media (min-width:600px){
.letter{font-size:18px;}
}

.cursor{
display:inline-block;
width:2px;
background:white;
animation:blink 1s infinite;
}

@keyframes blink{
50%{opacity:0;}
}
</style>
</head>

<body>

<button id="openBtn">Открыть письмо ✨</button>

<div class="scene" id="scene">
<div class="stars"></div>
<div class="sun" id="sun"></div>

<div class="sea">
<div class="wave"></div>
<div class="wave"></div>
</div>

<div class="letter">
<span id="text"></span><span class="cursor"></span>
</div>
</div>

<audio id="music" loop>
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_4bfae0c9a5.mp3" type="audio/mpeg">
</audio>

<script>
const message = `Дорогая Ксюнька...

Приглашаю тебя на вечерне-ночную прогулку по барам.
Будем пить, курить и вайбово проводить время.

А под утро найдём тихое место —
может пляж, может парк,
бутылка вина,
разговоры по душам.

Первый луч солнца.
Нежный поцелуй.
Тёплые объятия.
И ощущение, что эта ночь была только нашей.

13.03.26
20:00
На нашем любимом месте.

Буду ждать. 💛`;

const btn = document.getElementById("openBtn");
const scene = document.getElementById("scene");
const sun = document.getElementById("sun");
const textElement = document.getElementById("text");
const music = document.getElementById("music");

btn.onclick = function(){
btn.style.display="none";
scene.style.opacity="1";
music.volume=0.35;
music.play();

/* Ночь длится 10 секунд */
setTimeout(()=>{
scene.classList.add("dawn");
sun.style.bottom="35%";
},10000);

let i=0;
function typing(){
if(i<message.length){
textElement.innerHTML+=message[i];
i++;
setTimeout(typing,40);
}
}
setTimeout(typing,2000);
};
</script>

</body>
</html>
