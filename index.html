<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Для Ксюньки</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: 'Georgia', serif;
    background: black;
    color: white;
}

/* Кнопка */
#openBtn {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    padding: 18px 40px;
    font-size: 26px;
    background: transparent;
    color: #fff;
    border: 2px solid #fff;
    border-radius: 40px;
    cursor: pointer;
    transition: 0.4s;
}
#openBtn:hover {
    background: white;
    color: black;
}

/* Сцена */
.scene {
    position: fixed;
    width: 100%;
    height: 100%;
    opacity: 0;
    transition: opacity 2s ease;
    background: radial-gradient(circle at 50% 80%, #0a0a1f 0%, #000 70%);
}

/* Звёзды */
.stars {
    position: absolute;
    width: 100%;
    height: 100%;
    background: transparent;
}
.stars::after {
    content: "";
    position: absolute;
    width: 2px;
    height: 2px;
    background: white;
    box-shadow:
        100px 200px white,
        300px 100px white,
        600px 400px white,
        900px 150px white,
        1200px 350px white,
        500px 600px white,
        800px 500px white;
    animation: twinkle 2s infinite alternate;
}
@keyframes twinkle {
    from { opacity: 0.3; }
    to { opacity: 1; }
}

/* Солнце */
.sun {
    position: absolute;
    bottom: -200px;
    left: 50%;
    transform: translateX(-50%);
    width: 250px;
    height: 250px;
    background: radial-gradient(circle, #ffd27f 0%, #ff944d 60%, transparent 70%);
    border-radius: 50%;
    animation: sunrise 10s forwards;
    animation-delay: 3s;
}
@keyframes sunrise {
    to { bottom: 25%; }
}

/* Рассвет */
.dawn {
    animation: skyChange 12s forwards;
}
@keyframes skyChange {
    0% { background: radial-gradient(circle at 50% 80%, #0a0a1f 0%, #000 70%); }
    100% { background: linear-gradient(to top, #ff9966, #ff5e62, #3a1c71); }
}

/* Берег */
.beach {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 150px;
    background: linear-gradient(to top, #111, transparent);
}

/* Письмо */
.letter {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 80%;
    max-width: 800px;
    text-align: center;
    font-size: 20px;
    white-space: pre-line;
}

/* Курсор печати */
.cursor {
    display: inline-block;
    width: 2px;
    background: white;
    animation: blink 1s infinite;
}
@keyframes blink {
    50% { opacity: 0; }
}
</style>
</head>

<body>

<button id="openBtn">Открыть письмо ✨</button>

<div class="scene" id="scene">
    <div class="stars"></div>
    <div class="sun"></div>
    <div class="beach"></div>
    <div class="letter"><span id="text"></span><span class="cursor"></span></div>
</div>

<audio id="music" loop>
    <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_4bfae0c9a5.mp3" type="audio/mpeg">
</audio>

<script>
const message = `Дорогая Ксюнька...

Приглашаю тебя на вечерне-ночную прогулку по барам.
Будем пить, курить и вайбово проводить время.

А под утро найдём тихое место —
может пляж, может парк,
бутылка вина, разговоры по душам.

Первый луч солнца.
Нежный поцелуй.
Тёплые объятия.
И ощущение, что эта ночь была только нашей.

13.03.26
20:00
На нашем любимом месте.

Буду ждать. 💛`;

const textElement = document.getElementById("text");
const button = document.getElementById("openBtn");
const scene = document.getElementById("scene");
const music = document.getElementById("music");

button.addEventListener("click", () => {
    button.style.display = "none";
    scene.style.opacity = "1";
    scene.classList.add("dawn");
    music.play();
    typeWriter();
});

let i = 0;
function typeWriter() {
    if (i < message.length) {
        textElement.innerHTML += message.charAt(i);
        i++;
        setTimeout(typeWriter, 40);
    }
}
</script>

</body>
</html>
